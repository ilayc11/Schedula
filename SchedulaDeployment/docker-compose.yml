  frontend:
    image: schedula-frontend
    build:
      context: ../SchedulaFrontend
      dockerfile: Dockerfile
    container_name: schedula-frontend-cpu
    profiles: ["cpu"]
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

  frontend-gpu:
    image: schedula-frontend
    build:
      context: ../SchedulaFrontend
      dockerfile: Dockerfile
    container_name: schedula-frontend-gpu
    profiles: ["gpu"]
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
